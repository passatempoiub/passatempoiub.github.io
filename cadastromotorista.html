<!-- Script para gerar mensagem no WhatsApp -->
<script>
  const form = document.getElementById('cadastroForm');
  const link = document.getElementById('whatsappLink');
  const cpfInput = document.getElementById('cpf');
  const erroCpf = document.getElementById('erro-cpf');

  function validarCPF(cpf) {
    cpf = cpf.replace(/[^\d]+/g,''); // remove caracteres não numéricos
    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

    let soma = 0, resto;
    for (let i = 1; i <= 9; i++) soma += parseInt(cpf[i - 1]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf[9])) return false;

    soma = 0;
    for (let i = 1; i <= 10; i++) soma += parseInt(cpf[i - 1]) * (12 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf[10])) return false;

    return true;
  }

  form.addEventListener('input', () => {
    const nome = document.getElementById('nome').value;
    const cpf = cpfInput.value;
    const cidade = document.getElementById('cidade').value;
    const horarios = [...document.querySelectorAll('input[name="horario"]:checked')].map(e => e.value).join(", ");

    // Validação do CPF
    if (!validarCPF(cpf)) {
      erroCpf.style.display = 'block';
      link.href = "#";
      link.classList.add("disabled");
      return;
    } else {
      erroCpf.style.display = 'none';
      link.classList.remove("disabled");
    }

    const msg = `Olá! Gostaria de solicitar a revisão do meu cadastro na DiCarro:%0A
*Nome:* ${nome}%0A
*CPF:* ${cpf}%0A
*Cidade onde deseja atuar:* ${cidade}%0A
*Horários disponíveis:* ${horarios}`;

    link.href = `https://wa.me/5564996669259?text=${msg}`;
  });
</script>
